name: echo
description: ECHO - Accessibility-focused mobile app for live public announcements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Auth
  supabase_flutter: ^2.3.4

  # Localization & Formatting
  intl: ^0.20.2

  # Accessibility & Speech
  flutter_tts: ^3.8.5
  speech_to_text: ^7.3.0

  # Connectivity & Storage
  connectivity_plus: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Notifications
  flutter_local_notifications: ^17.0.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

  # Navigation
  go_router: ^13.2.0

  # Utils
  equatable: ^2.0.5
  uuid: ^4.2.2
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/data/
    - .env
